<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sam's Chat Flair</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #0f0f12;
      color: #e5e5e5;
    }

    .header {
      background: linear-gradient(135deg, #1a1a24, #0f0f18);
      border-bottom: 1px solid #2a2a3a;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      font-size: 22px;
    }

    .title-block h1 {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.3px;
    }

    .title-block p {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }

    .stats {
      padding: 14px 16px;
      border-bottom: 1px solid #1e1e2e;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
    }

    .stat-label {
      color: #888;
      font-size: 12px;
    }

    .stat-value {
      font-weight: 600;
      font-size: 13px;
      color: #c084fc;
    }

    .status-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4ade80;
      margin-right: 5px;
      box-shadow: 0 0 5px #4ade80;
    }

    .status-dot.inactive {
      background: #ef4444;
      box-shadow: 0 0 5px #ef4444;
    }

    .rarity-legend {
      padding: 12px 16px;
      border-bottom: 1px solid #1e1e2e;
    }

    .rarity-legend h3 {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #555;
      margin-bottom: 8px;
    }

    .rarity-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 2px 0;
      font-size: 11px;
    }

    .rarity-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .footer {
      padding: 12px 16px;
    }

    .shop-link {
      display: block;
      text-align: center;
      padding: 8px 16px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 12px;
      transition: opacity 0.15s;
    }

    .shop-link:hover {
      opacity: 0.9;
    }

    .shop-link small {
      display: block;
      font-weight: 400;
      font-size: 10px;
      opacity: 0.8;
      margin-top: 1px;
    }

    #page-status {
      font-size: 11px;
      color: #555;
      text-align: center;
      padding: 4px 0 0;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🌶️</div>
    <div class="title-block">
      <h1>Sam's Chat Flair</h1>
      <p>kick.com/sam chat customiser</p>
    </div>
  </div>

  <div class="stats">
    <div class="stat-row">
      <span class="stat-label"><span class="status-dot" id="status-dot"></span>Status</span>
      <span class="stat-value" id="status-text">Loading...</span>
    </div>

  </div>



  <div class="footer">
    <a href="https://sam.sucks/shop" target="_blank" class="shop-link">
      🛒 Get your own emoji
      <small>sam.sucks/shop</small>
    </a>
    <p id="page-status"></p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
